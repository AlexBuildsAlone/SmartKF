<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.product_name }} 智能客服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1677ff;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header .icon { font-size: 24px; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.assistant { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.assistant .avatar { background: #1677ff; color: white; }
        .message.user .avatar { background: #52c41a; color: white; }
        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.assistant .bubble {
            background: white;
            color: #333;
            border-top-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .message.user .bubble {
            background: #1677ff;
            color: white;
            border-top-right-radius: 4px;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .input-area {
            background: white;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #e8e8e8;
        }
        .input-area textarea {
            flex: 1;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            height: 44px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
        }
        .input-area textarea:focus { border-color: #1677ff; }
        .input-area button {
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 24px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-area button:hover { background: #4096ff; }
        .input-area button:disabled { background: #d9d9d9; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon">🤖</span>
        <span>{{ config.product_name }} 智能客服</span>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <textarea id="userInput" placeholder="请输入您的问题..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const sessionId = crypto.randomUUID ? crypto.randomUUID() : 'sess-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isWaiting = false;

        // 显示欢迎语
        addMessage('assistant', {{ config.welcome_message | tojson }});

        // Enter 发送，Shift+Enter 换行
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 自动调整输入框高度
        userInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            const avatarText = role === 'assistant' ? '🤖' : '👤';
            div.innerHTML = `
                <div class="avatar">${avatarText}</div>
                <div class="bubble">${escapeHtml(content)}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingMsg';
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isWaiting) return;

            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = '44px';

            isWaiting = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message }),
                });
                const data = await res.json();
                removeTyping();

                if (data.error) {
                    addMessage('assistant', '⚠️ ' + data.error);
                } else {
                    addMessage('assistant', data.reply);
                }
            } catch (err) {
                removeTyping();
                addMessage('assistant', '⚠️ 网络错误，请稍后重试');
            }

            isWaiting = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    </script>
</body>
</html>
