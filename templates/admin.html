<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.product_name }} — 聊天记录管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: #1677ff;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .session-card {
            background: white;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .session-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-header:hover { background: #fafafa; }
        .session-id { font-weight: 600; color: #333; font-family: monospace; }
        .session-meta { color: #999; font-size: 13px; display: flex; gap: 16px; }
        .session-detail {
            display: none;
            border-top: 1px solid #f0f0f0;
            padding: 16px 20px;
            background: #fafafa;
        }
        .session-detail.open { display: block; }
        .log-message {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        .log-role {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
            height: fit-content;
        }
        .log-role.assistant { background: #e6f4ff; color: #1677ff; }
        .log-role.user { background: #f6ffed; color: #52c41a; }
        .log-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-time { font-size: 12px; color: #bbb; margin-top: 2px; }
        .empty { text-align: center; color: #999; padding: 60px 0; }
        .loading { text-align: center; color: #999; padding: 40px 0; }
    </style>
</head>
<body>
    <div class="header">
        <span>📋 {{ config.product_name }} 聊天记录</span>
        <a href="/">← 返回对话</a>
    </div>
    <div class="container" id="sessionList">
        <div class="loading">加载中...</div>
    </div>

    <script>
        const password = {{ password | tojson }};

        async function loadSessions() {
            const res = await fetch('/api/sessions?password=' + encodeURIComponent(password));
            const data = await res.json();
            const container = document.getElementById('sessionList');

            if (!data.sessions || data.sessions.length === 0) {
                container.innerHTML = '<div class="empty">暂无聊天记录</div>';
                return;
            }

            container.innerHTML = data.sessions.map(s => `
                <div class="session-card">
                    <div class="session-header" onclick="toggleSession(this, '${s.session_id}')">
                        <span class="session-id">${s.session_id.substring(0, 8)}...</span>
                        <div class="session-meta">
                            <span>${formatTime(s.created_at)}</span>
                            <span>${s.message_count} 条消息</span>
                        </div>
                    </div>
                    <div class="session-detail" id="detail-${s.session_id}"></div>
                </div>
            `).join('');
        }

        async function toggleSession(header, sessionId) {
            const detail = document.getElementById('detail-' + sessionId);
            if (detail.classList.contains('open')) {
                detail.classList.remove('open');
                return;
            }

            if (!detail.innerHTML) {
                detail.innerHTML = '<div class="loading">加载中...</div>';
                const res = await fetch('/api/sessions/' + sessionId + '?password=' + encodeURIComponent(password));
                const data = await res.json();

                detail.innerHTML = data.messages.map(m => `
                    <div class="log-message">
                        <span class="log-role ${m.role}">${m.role === 'assistant' ? 'AI' : '用户'}</span>
                        <div>
                            <div class="log-content">${escapeHtml(m.content)}</div>
                            <div class="log-time">${formatTime(m.timestamp)}</div>
                        </div>
                    </div>
                `).join('');
            }

            detail.classList.add('open');
        }

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadSessions();
    </script>
</body>
</html>
